<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        #area {
            background-color: rgb(10, 101, 71);
            color: white;
            font-weight: 400;
            font-size: 1.5em;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>

    <script>
        var a = window.document.getElementById('area');
        a.addEventListener('click', clicar);
        a.addEventListener('mouseenter', entrar);
        a.addEventListener('mouseout', sair);
        function clicar() {
        
            a.innerText = 'Clicou!';
            a.style.backgroundColor = 'red';

        }
        function entrar() {
            a.innerText = 'Entrou!';
            a.style.backgroundColor = 'rgb(10, 71, 101)';
        }
        function sair() {
            a.innerText = 'Saiu!';
            a.style.backgroundColor = 'green';
        }
    </script>
</body>
</html>
